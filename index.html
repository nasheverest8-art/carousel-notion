<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Carousel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="carousel-wrapper">

        <button class="nav prev">&#10094;</button>

        <div class="carousel">
            <div class="slides">
                <img src="images/image1.png" class="slide">
                <img src="images/image2.png" class="slide">
                <img src="images/image3.png" class="slide">
                <img src="images/image4.png" class="slide">
                <img src="images/image5.png" class="slide">
                <img src="images/image6.png" class="slide">
                <img src="images/image7.png" class="slide">
            </div>
        </div>

        <button class="nav next">&#10095;</button>

    </div>

    <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

    <script src="script.js"></script>

</body>
</html>
